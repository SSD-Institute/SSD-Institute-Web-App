name: Dash Integration Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dash[testing] pandas plotly pytest selenium webdriver-manager

      - name: Run Headless Tests
        env:
          PYTHONPATH: ${{ github.workspace }}/SSDFlask
        run: |
          pytest ssdFlask/visualization_scripts/tests/ --headless